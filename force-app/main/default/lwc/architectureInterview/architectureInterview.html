<template>
    <template lwc:if={isStepLoading}>
        <div class="container">
            <div class="loading-card">
                <lightning-spinner alternative-text="Chargement" size="large"></lightning-spinner>
                <p class="loading-text">Chargement de l entretien architecture...</p>
            </div>
        </div>
    </template>

    <template lwc:if={isStepError}>
        <div class="container">
            <div class="error-card">
                <div class="error-icon">!</div>
                <h2>Erreur</h2>
                <p>{errorMessage}</p>
            </div>
        </div>
    </template>

    <template lwc:if={isStepWelcome}>
        <div class="container">
            <div class="welcome-card">
                <div class="welcome-header">
                    <div class="welcome-icon">Architecture</div>
                    <h1>Entretien Architecture</h1>
                    <p class="welcome-subtitle">HR Talent Portal · Talan Tunisie</p>
                </div>

                <div class="info-grid">
                    <div class="info-item">
                        <span class="info-label">Candidat</span>
                        <span class="info-value">{candidateName}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Poste</span>
                        <span class="info-value">{jobTitle}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Date</span>
                        <span class="info-value">{scheduledDateFormatted}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Duree</span>
                        <span class="info-value">{durationLabel}</span>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn-primary" onclick={handleStartInterview}>
                        Acceder a l entretien
                    </button>
                    <template lwc:if={canReschedule}>
                        <button class="btn-secondary" onclick={handleShowReschedule}>
                            Demander un report
                        </button>
                    </template>
                </div>

                <template lwc:if={rescheduleRequested}>
                    <div class="info-banner warning">
                        Votre demande de report a ete envoyee au recruteur.
                    </div>
                </template>
            </div>
        </div>
    </template>

    <template lwc:if={isStepInterview}>
        <div class="container interview-container">
            <div class="jitsi-section">
                <div class="jitsi-header">
                    <h2>Visioconference Jitsi</h2>
                    <span class="jitsi-room-badge">{jitsiRoom}</span>
                </div>
                <div class="jitsi-launch-wrapper">
                    <div class="jitsi-launch-card">
                        <div class="jitsi-launch-icon">Video</div>
                        <h3>Rejoindre la visioconference</h3>
                        <p class="jitsi-launch-info">
                            Cette etape ne fait pas de transcription ni d analyse IA.
                            Le recruteur evaluera l entretien manuellement.
                        </p>
                        <a href={jitsiUrl} target="_blank" rel="noopener noreferrer" class="btn-jitsi">
                            Ouvrir Jitsi Meet
                        </a>
                        <p class="jitsi-room-info">Salle: <strong>{jitsiRoom}</strong></p>
                        <div class="interview-actions">
                            <button class="btn-secondary" onclick={handleMarkDone}>
                                Entretien termine
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <template lwc:if={isStepDone}>
        <div class="container">
            <div class="completion-card">
                <div class="completion-header">
                    <h1>Entretien Architecture termine</h1>
                    <p>{candidateName} · {jobTitle}</p>
                </div>
                <div class="completion-content">
                    <p>
                        Merci. Le recruteur validera la grille Architecture puis decidera:
                        RH Fit, Review ou Rejet.
                    </p>
                </div>
            </div>
        </div>
    </template>

    <template lwc:if={showRescheduleModal}>
        <section class="modal-overlay" onclick={handleCloseReschedule}>
            <div class="modal-content" onclick={stopPropagation}>
                <h2>Demande de report</h2>
                <p>Vous ne pouvez demander qu un seul report.</p>
                <textarea
                    class="reschedule-textarea"
                    placeholder="Motif du report (optionnel)"
                    value={rescheduleReason}
                    onchange={handleRescheduleReasonChange}
                ></textarea>
                <div class="modal-actions">
                    <button class="btn-secondary" onclick={handleCloseReschedule}>Annuler</button>
                    <button class="btn-primary" onclick={handleSubmitReschedule} disabled={isRescheduling}>
                        {rescheduleButtonLabel}
                    </button>
                </div>
            </div>
        </section>
    </template>
</template>
