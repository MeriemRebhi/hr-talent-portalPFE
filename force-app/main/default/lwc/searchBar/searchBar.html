<template>
    <section class="search-hero">
        <div class="hero-content">
            <span class="hero-label">Portail Talent RH</span>
            <h1 class="hero-title">Trouvez l'opportunité qui vous correspond</h1>
            <p class="hero-subtitle">Explorez des centaines d'offres et lancez votre prochaine aventure professionnelle.</p>

            <div class="search-row">
                <div class="search-field" role="combobox" aria-expanded={showSuggestions} aria-haspopup="listbox">
                    <svg class="field-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                        <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.45 4.38l4.09 4.08a.75.75 0 11-1.06 1.06l-4.08-4.09A7 7 0 012 9z" clip-rule="evenodd"/>
                    </svg>
                    <input
                        type="text"
                        class="search-input"
                        placeholder="Poste, compétence ou mot-clé…"
                        oninput={handleInput}
                        onkeydown={handleKeydown}
                        onfocusout={handleBlur}
                        value={searchTerm}
                        aria-label="Recherche"
                        autocomplete="off"
                    />
                    <template if:true={searchTerm}>
                        <button class="clear-btn" onclick={handleClear} aria-label="Effacer" type="button">
                            <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z"/></svg>
                        </button>
                    </template>

                    <template if:true={showSuggestions}>
                        <ul class="suggestions-list" role="listbox">
                            <template for:each={suggestions} for:item="suggestion">
                                <li key={suggestion} class="suggestion-item" role="option" onmousedown={handleSuggestionClick}>
                                    <svg class="sug-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                                        <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.45 4.38l4.09 4.08a.75.75 0 11-1.06 1.06l-4.08-4.09A7 7 0 012 9z" clip-rule="evenodd"/>
                                    </svg>
                                    {suggestion}
                                </li>
                            </template>
                        </ul>
                    </template>
                </div>

                <button class="search-btn" onclick={handleSearch} type="button">
                    <svg class="btn-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                        <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.45 4.38l4.09 4.08a.75.75 0 11-1.06 1.06l-4.08-4.09A7 7 0 012 9z" clip-rule="evenodd"/>
                    </svg>
                    Rechercher
                </button>
            </div>

            <template if:true={showTags}>
                <div class="tags-row">
                    <span class="tags-label">Populaires :</span>
                    <template for:each={tags} for:item="tag">
                        <button key={tag} class="tag" onclick={handleTagClick} type="button">{tag}</button>
                    </template>
                </div>
            </template>
        </div>
    </section>
</template>
