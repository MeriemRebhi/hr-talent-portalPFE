<template>
    <!-- ═══ CHARGEMENT ═══ -->
    <template if:true={isLoading}>
        <div class="standalone-wrapper">
            <div class="standalone-card">
                <div class="loading-content">
                    <div class="standalone-logo">Portail RH Talan</div>
                    <div class="spinner-container">
                        <div class="spinner"></div>
                    </div>
                    <p class="loading-text">Vérification du lien sécurisé...</p>
                </div>
            </div>
        </div>
    </template>

    <!-- ═══ ERREUR TOKEN ═══ -->
    <template if:true={showError}>
        <div class="standalone-wrapper">
            <div class="standalone-card">
                <div class="error-content">
                    <div class="standalone-logo">Portail RH Talan</div>
                    <div class="error-icon">&#128683;</div>
                    <h2>Lien invalide</h2>
                    <p class="error-message">{errorMessage}</p>
                    <a href={homeUrl} class="back-link">&#8592; Retour à l'accueil</a>
                </div>
            </div>
        </div>
    </template>

    <!-- ═══ FORMULAIRE MOT DE PASSE ═══ -->
    <template if:true={showForm}>
        <div class="standalone-wrapper">
            <div class="standalone-card">
                <div class="form-layout">
                    <div class="form-col">
                        <div class="form-header">
                            <div class="standalone-logo">Portail RH Talan</div>
                            <div class="security-badge">&#128274; Connexion sécurisée</div>
                            <h2>Définissez votre mot de passe</h2>
                            <p class="form-sub">Bienvenue <strong>{userEmail}</strong>. Choisissez un mot de passe sécurisé pour activer votre espace candidat.</p>
                        </div>

                        <form class="password-form" onsubmit={handleSubmit}>
                            <template if:true={formError}>
                                <div class="form-error">{formError}</div>
                            </template>

                            <label for="newPwd">Nouveau mot de passe</label>
                            <div class="input-wrapper">
                                <input
                                    id="newPwd"
                                    type={passwordFieldType}
                                    class="input-pro"
                                    value={newPassword}
                                    oninput={handleNewPasswordInput}
                                    placeholder="Min. 8 caractères"
                                    required
                                    autocomplete="new-password"
                                />
                                <button type="button" class="toggle-pwd-btn" onclick={togglePasswordVisibility} title="Afficher/masquer">
                                    <template if:true={showPasswordText}>&#128065;</template>
                                    <template if:false={showPasswordText}>&#128064;</template>
                                </button>
                            </div>

                            <!-- Indicateurs de force -->
                            <div class="strength-indicators">
                                <div class={strengthBarClass}>
                                    <div class="strength-fill" style={strengthBarStyle}></div>
                                </div>
                                <span class={strengthLabelClass}>{strengthLabel}</span>
                            </div>
                            <ul class="pwd-rules">
                                <li class={rule8CharsClass}>Au moins 8 caractères</li>
                                <li class={ruleUpperClass}>Une lettre majuscule</li>
                                <li class={ruleLowerClass}>Une lettre minuscule</li>
                                <li class={ruleDigitClass}>Un chiffre</li>
                                <li class={ruleSpecialClass}>Un caractère spécial (!@#$%...)</li>
                            </ul>

                            <label for="confirmPwd">Confirmer le mot de passe</label>
                            <input
                                id="confirmPwd"
                                type="password"
                                class="input-pro"
                                value={confirmPassword}
                                oninput={handleConfirmPasswordInput}
                                required
                                autocomplete="new-password"
                            />
                            <template if:true={passwordMismatch}>
                                <div class="mismatch-msg">Les mots de passe ne correspondent pas.</div>
                            </template>

                            <button class="submit-btn" type="submit" disabled={isSubmitDisabled}>
                                <template if:true={isSubmitting}>
                                    <span class="btn-spinner"></span> Mise à jour...
                                </template>
                                <template if:false={isSubmitting}>
                                    Activer mon compte &#8594;
                                </template>
                            </button>
                        </form>
                    </div>
                    <div class="image-col">
                        <div class="image-wrapper">
                            <img src="/sfsites/c/resource/imageLogin" alt="Talent IA" class="hero-img" />
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- ═══ SUCCÈS ═══ -->
    <template if:true={showSuccess}>
        <div class="standalone-wrapper">
            <div class="standalone-card">
                <div class="success-content">
                    <div class="standalone-logo">Portail RH Talan</div>
                    <div class="success-icon">&#9989;</div>
                    <h2>Mot de passe défini !</h2>
                    <p class="success-message">Votre compte est maintenant actif. Vous pouvez vous connecter avec votre email et votre nouveau mot de passe.</p>
                    <a href={loginUrl} class="login-link-btn">Se connecter &#8594;</a>
                </div>
            </div>
        </div>
    </template>
</template>
